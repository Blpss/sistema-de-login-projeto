<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Lado Esquerdo - Mensagem -->
        <div class="left-section">
            <div class="message-box">
                <h2>Bem-vindo!</h2>
                <p class="instruction-text">Coloque seu nome</p>
                <p class="instruction-text">e a senha:</p>
                <p class="password-hint">12345678</p>
            </div>
        </div>

        <!-- Lado Direito - Formulário -->
        <div class="login-box">
            <!-- Avatar do usuário -->
            <div class="avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M 4 20 Q 4 14 12 14 Q 20 14 20 20"></path>
                </svg>
            </div>

            <h1>Login</h1>

            <form id="loginForm">
                <!-- Campo de Nome/Usuário -->
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Nome de usuário" 
                        class="input-field"
                        required
                    >
                </div>

                <!-- Campo de Senha -->
                <div class="form-group">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Senha" 
                        class="input-field"
                        required
                    >
                </div>

                <!-- Botão de Login -->
                <button type="submit" class="login-btn">Entrar</button>
            </form>

            <p class="signup-link">
                Não tem conta? <a href="#signup">Criar conta</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
